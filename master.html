<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রথম কথা - প্রো পোর্টাল</title>
    
    <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s ease; }

        body { 
            font-family: 'Kalpurush', Arial, sans-serif; 
            background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .bg-circle { position: fixed; border-radius: 50%; z-index: -1; filter: blur(80px); opacity: 0.4; animation: float 15s infinite alternate; }
        .c1 { width: 300px; height: 300px; background: #00d2ff; top: -50px; left: -50px; }
        .c2 { width: 400px; height: 400px; background: #ff007f; bottom: -100px; right: -50px; }
        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(50px, 50px); } }

        .main-container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px);
            padding: 50px 30px; 
            border-radius: 30px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            width: 100%;
            max-width: 500px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .app-logo {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        h1 { font-size: 32px; margin-bottom: 10px; font-weight: bold; }
        p { color: #aaa; font-size: 16px; margin-bottom: 40px; }

        .portal-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-audio:hover { background: linear-gradient(45deg, #00d2ff, #3a7bd5); transform: translateY(-5px); border-color: transparent;}
        .btn-story:hover { background: linear-gradient(45deg, #e91e63, #f06292); transform: translateY(-5px); border-color: transparent;}

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

    </style>
</head>
<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="main-container">
    <div class="app-logo">
        🎤
    </div>
    <h1>প্রথম কথা - প্রো</h1>
    <p>আপনার পছন্দের পোর্টাল সিলেক্ট করুন</p>

    <!-- Audio Portal Link updated to match your file name -->
    <a href="Prothom%20kotha.html" class="portal-btn btn-audio">
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="icon-box"><i class="fas fa-headphones-alt"></i></div>
            <span>অডিও পোর্টাল</span>
        </div>
        <i class="fas fa-chevron-right"></i>
    </a>

    <!-- Story Portal Link updated to match your file name -->
    <a href="Golpolikhun.html" class="portal-btn btn-story">
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="icon-box"><i class="fas fa-book-open"></i></div>
            <span>গল্পপাঠান (স্টোরি)</span>
        </div>
        <i class="fas fa-chevron-right"></i>
    </a>
</div>

</body>
</html>
